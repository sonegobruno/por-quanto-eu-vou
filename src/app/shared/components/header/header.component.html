  <header class="pqev-header__container">
    <img src="/logo.svg" alt="Logo Por Quanto Eu Vou">
    <button matIconButton data-testid="header-theme-button" (click)="themeService.toggleTheme()"  matTooltip="Alterar tema">
      <pqev-icon
        class="pqev-header__theme-icone"
        [icon]="themeService.isLightMode() ? 'dark_mode' : 'light_mode'"
        data-testid="header-theme-button-icon"
      ></pqev-icon>
    </button>
  </header>
